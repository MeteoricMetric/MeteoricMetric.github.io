<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Merric S.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Merric's corner of the internet. Minecraft, art, gaming, and whatever's next.">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #8b6bff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .avatar {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      display: block;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.25rem;
      letter-spacing: -0.02em;
    }
    .tag {
      color: #666;
      margin-bottom: 2rem;
      font-size: 1.05rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .links a {
      display: block;
      padding: 1rem;
      background: #f4f4f8;
      border-radius: 12px;
      text-decoration: none;
      color: #1a1a1a;
      font-weight: 600;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    .links a:hover {
      background: #8b6bff;
      color: #fff;
      transform: translateY(-2px);
      border-color: #1a1a1a;
    }
    footer {
      margin-top: 2rem;
      color: #999;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="avatar.jpg" alt="Merric" class="avatar">
    <h1>Merric S.</h1>
    <p class="tag">Builder. Gamer. 13. Figuring it out.</p>
    <nav class="links">
      <a href="https://minecraft.merricstrough.com">⛏️ Minecraft Server</a>
      <a href="https://youtube.merricstrough.com">📺 YouTube</a>
      <a href="https://art.merricstrough.com">🎨 Artwork</a>
    </nav>
    <footer>Built with my dad. More coming.</footer>
  </main>
</body>
</html>
